server:
  port: 8080
  mode: release

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 20
  max_retries: 3
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

mysql:
  host: 127.0.0.1
  port: 3306
  username: root
  password: root
  database: cx3_shelf
  charset: utf8mb4
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime: 3600
  conn_max_idle_time: 600

log:
  level: info
  filename: logs/app.log
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true

rate_limit:
  pickup_qps: 10000
  lock_qps: 100
  bucket_size: 20000

idempotent:
  ttl_seconds: 300

shelf:
  lock_timeout_seconds: 1800
